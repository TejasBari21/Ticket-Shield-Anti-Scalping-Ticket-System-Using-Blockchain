<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ringGrad" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#c026d3"/>
      <stop offset="35%"  stop-color="#7c3aed"/>
      <stop offset="65%"  stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="innerHighlight" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#e879f9" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#f0e6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f0820" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#glowBg)" filter="url(#blur)"/>
  <circle cx="100" cy="100" r="80" stroke="url(#ringGrad)" stroke-width="22" fill="none" filter="url(#softglow)"/>
  <path d="M 120 22 A 80 80 0 0 1 178 80"
        stroke="#e879f9" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M 35 148 A 80 80 0 0 0 80 178"
        stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.75"/>
  <circle cx="100" cy="100" r="67" stroke="url(#innerHighlight)" stroke-width="2" fill="none" opacity="0.6"/>
</svg>

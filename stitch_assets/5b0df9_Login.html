<body class="min-h-screen flex flex-col justify-center items-center p-6 selection:bg-primary/30">
<div class="mesh-gradient"></div>
<!-- Exclusion Protocol: No NavBars for Linear Login Flow -->
<main class="w-full max-w-[440px] relative">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-16 h-16 rounded-xl sovereign-gradient flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(108,59,255,0.25)]">
<span class="material-symbols-outlined text-on-primary-fixed text-4xl" data-weight="fill">shield</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-2">TicketShield</h1>
<p class="font-body text-on-surface-variant text-sm">Secure access to your sovereign digital assets</p>
</div>
<!-- Login Container -->
<div class="glass-panel rounded-[2rem] p-8 shadow-2xl relative overflow-hidden">
<!-- Subtle accent light -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<form class="space-y-6">
<!-- Input Group: Email -->
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant px-1 uppercase tracking-widest">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors">alternate_email</span>
</div>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 transition-all font-body" placeholder="name@vault.com" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Security Key</label>
<a class="text-[10px] font-semibold text-primary/70 hover:text-primary transition-colors uppercase tracking-wider" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 transition-all font-body" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline/50 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full sovereign-gradient py-4 rounded-xl text-on-primary-fixed font-headline font-bold text-lg shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Login Securely
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label text-[10px] text-on-surface-variant uppercase tracking-[0.2em]">Social Protocol</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Social Sign In -->
<button class="w-full bg-surface-container-high border border-outline-variant/10 py-4 rounded-xl flex items-center justify-center gap-3 hover:bg-surface-container-highest transition-colors font-body text-on-surface group" type="button">
<img alt="Google" class="w-5 h-5 group-hover:scale-110 transition-transform" data-alt="Official Google G Logo Colorful" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABVI6VFpwIOIvIYeW9LKwltMvixBBrtYj1LBNw1_xYNFAmVT5wzKZM8cOhIKeBrC3TL5OBnwCVgk5VUMhWzs2QpMsds_k-7DL_TS9YYQOriGp9QhtbwU_kGr1feraAqJ4Ey2Ob6r16JKySu6L539cX_Q9Ty_0mAqw1_jfsDCdFLYZunzVbMT0hLRWmOomueRSXBfuvVIS-j98JMJPzzN2BVnEoJZue-fjHjFS3IgVYMc8TD2v2KJdNjCOR1miSVmSmtvORxkdic2Q"/>
<span>Continue with Google</span>
</button>
</form>
</div>
<!-- Secondary Actions & Metadata -->
<div class="mt-8 flex flex-col items-center gap-6">
<a class="group flex items-center gap-2 font-label text-xs font-medium text-on-surface-variant hover:text-secondary transition-colors" href="#">
<span class="material-symbols-outlined text-lg">admin_panel_settings</span>
                Admin / Event Organizer Login
            </a>
<!-- Technical Utilities -->
<div class="flex items-center gap-4 pt-4 border-t border-outline-variant/10 w-full justify-center">
<button class="flex items-center gap-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm">settings</span>
<span class="text-[10px] uppercase tracking-widest font-bold">API Configuration</span>
</button>
<div class="w-1 h-1 rounded-full bg-outline-variant/30"></div>
<div class="flex items-center gap-1.5">
<span class="flex h-1.5 w-1.5 rounded-full bg-tertiary"></span>
<span class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">System Nominal</span>
</div>
</div>
</div>

<!-- Background Decoration -->
<div class="fixed bottom-0 left-0 p-8 pointer-events-none opacity-20">
<p class="font-headline text-8xl font-black text-outline/10 select-none">VAULT</p>
</div>
